<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:15px; }

input, button { width:100%; padding:15px; margin:8px 0; font-size:18px; }

button { background:#00c853; color:#fff; border:none; }

.box {
  background:#222;
  padding:10px;
  margin-top:5px;
  cursor:pointer;
}

.hidden { display:none; }

#suggestions { margin-top:5px; }
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<!-- חיפוש ספק -->
<input id="supplierSearch" placeholder="חפש ספק / הקלד שם">
<div id="suggestions"></div>

<!-- כפתור הוספת ספק -->
<button onclick="toggleAddSupplier()">➕ הוסף ספק</button>

<div id="addBox" class="hidden">
  <input id="newSupplier" placeholder="שם ספק חדש">
  <button onclick="addSupplier()">שמור ספק</button>
</div>

<!-- נתונים -->
<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">
<input type="file" id="file" accept="image/*">

<button onclick="upload()">שלח</button>

<script>
const API = "https://invoice-backend-omy5.onrender.com";

let suppliersList = [];

document.getElementById("date").valueAsDate = new Date();

/* ---------------- ספקים ---------------- */

async function loadSuppliers(){
  let res = await fetch(API+"/suppliers");
  suppliersList = await res.json();
}
loadSuppliers();

document.getElementById("supplierSearch").addEventListener("input", function(){
  let val = this.value.toLowerCase();
  let box = document.getElementById("suggestions");

  box.innerHTML = "";

  let filtered = suppliersList.filter(s => s.toLowerCase().includes(val));

  filtered.forEach(s=>{
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = s;

    div.onclick = ()=>{
      document.getElementById("supplierSearch").value = s;
      box.innerHTML = "";
    };

    box.appendChild(div);
  });
});

/* ---------------- הוספת ספק ---------------- */

function toggleAddSupplier(){
  document.getElementById("addBox").classList.toggle("hidden");
}

async function addSupplier(){
  let name = document.getElementById("newSupplier").value;

  if(!name){
    alert("כתוב שם ספק");
    return;
  }

  await fetch(API+"/supplier",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });

  document.getElementById("newSupplier").value = "";
  document.getElementById("addBox").classList.add("hidden");

  await loadSuppliers();

  alert("✔ ספק נוסף");
}

/* ---------------- העלאה ---------------- */

async function upload(){

  let file = document.getElementById("file").files[0];

  if(!file){
    alert("בחר קובץ");
    return;
  }

  let supplier = document.getElementById("supplierSearch").value;

  if(!supplier){
    alert("בחר ספק");
    return;
  }

  let form = new FormData();
  form.append("supplier", supplier);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", file);

  try{
    let res = await fetch(API+"/upload",{
      method:"POST",
      body: form
    });

    let data = await res.json();

    alert("✔ הועלה בהצלחה");

  }catch(e){
    alert("❌ שגיאה בהעלאה");
    console.log(e);
  }
}

</script>

</body>
</html>
