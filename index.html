<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:15px; }

input, button {
  width:100%;
  padding:15px;
  margin:8px 0;
  font-size:18px;
}

button { background:#00c853; color:#fff; border:none; }

.box {
  background:#222;
  padding:10px;
  margin-top:5px;
  cursor:pointer;
}

.hidden { display:none; }

#dropdown {
  max-height:200px;
  overflow-y:auto;
}
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<!-- חיפוש ספק -->
<input id="supplierSearch" placeholder="חפש ספק או בחר">

<div id="dropdown"></div>

<button onclick="toggleAdd()">➕ הוסף ספק</button>

<div id="addBox" class="hidden">
  <input id="newSupplier" placeholder="שם ספק חדש">
  <button onclick="addSupplier()">שמור ספק</button>
</div>

<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">
<input type="file" id="file" accept="image/*">

<button onclick="upload()">שלח</button>

<script>
const API = "https://invoice-backend-omy5.onrender.com";

let suppliers = [];
let lastUsed = null;

document.getElementById("date").valueAsDate = new Date();

/* ---------------- טעינה ---------------- */

async function loadSuppliers(){
  let res = await fetch(API+"/suppliers");
  suppliers = await res.json();
  renderList();
}
loadSuppliers();

/* ---------------- תצוגה ---------------- */

function renderList(){
  let box = document.getElementById("dropdown");
  box.innerHTML = "";

  let list = [...suppliers];

  if(lastUsed){
    list = list.filter(x=>x!==lastUsed);
    list.unshift(lastUsed);
  }

  list.sort((a,b)=>a.localeCompare(b,'he'));

  list.forEach(s=>{
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = s;

    div.onclick = ()=>{
      document.getElementById("supplierSearch").value = s;
      lastUsed = s;
      renderList();
    };

    box.appendChild(div);
  });
}

/* ---------------- חיפוש ---------------- */

document.getElementById("supplierSearch").addEventListener("input", function(){
  let val = this.value.toLowerCase();

  let box = document.getElementById("dropdown");
  box.innerHTML = "";

  suppliers
    .filter(s => s.toLowerCase().includes(val))
    .forEach(s=>{
      let div = document.createElement("div");
      div.className = "box";
      div.innerText = s;

      div.onclick = ()=>{
        document.getElementById("supplierSearch").value = s;
        lastUsed = s;
        renderList();
      };

      box.appendChild(div);
    });
});

/* ---------------- ספקים ---------------- */

function toggleAdd(){
  document.getElementById("addBox").classList.toggle("hidden");
}

async function addSupplier(){
  let name = document.getElementById("newSupplier").value;

  if(!name) return;

  await fetch(API+"/supplier",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });

  document.getElementById("newSupplier").value = "";
  document.getElementById("addBox").classList.add("hidden");

  await loadSuppliers();
}

/* ---------------- העלאה ---------------- */

async function upload(){

  let file = document.getElementById("file").files[0];
  let supplier = document.getElementById("supplierSearch").value;

  if(!file || !supplier){
    alert("חסר נתונים");
    return;
  }

  let form = new FormData();
  form.append("supplier", supplier);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", file);

  let res = await fetch(API+"/upload",{
    method:"POST",
    body: form
  });

  let data = await res.json();

  if(!res.ok){
    alert("⚠️ " + data.message);
    return;
  }

  alert("✔ הועלה בהצלחה");
}
</script>

</body>
</html>
