<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:15px; }

input, button {
  width:100%;
  padding:15px;
  margin:8px 0;
  font-size:18px;
}

button { background:#00c853; color:#fff; border:none; }

.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  padding:20px;
}

.modal-content {
  background:#222;
  padding:15px;
  max-height:80%;
  overflow-y:auto;
}

.item {
  padding:10px;
  margin:5px 0;
  background:#333;
  cursor:pointer;
}

.hidden { display:none; }
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<!-- ספק -->
<button onclick="openSuppliers()">בחר ספק</button>
<div id="selectedSupplier">לא נבחר ספק</div>

<!-- מודל ספקים -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>בחר ספק</h3>
    <input id="search" placeholder="חיפוש ספק">
    <div id="list"></div>
    <button onclick="closeModal()">סגור</button>
  </div>
</div>

<!-- נתונים -->
<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">
<input type="file" id="file" accept="image/*">

<button onclick="upload()">שלח</button>

<script>
const API = "https://invoice-backend-omy5.onrender.com";

let suppliers = [];
let selected = "";

document.getElementById("date").valueAsDate = new Date();

/* ---------------- ספקים ---------------- */

async function loadSuppliers(){
  let res = await fetch(API+"/suppliers");
  suppliers = await res.json();
}
loadSuppliers();

function openSuppliers(){
  document.getElementById("modal").style.display = "block";
  renderList();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function renderList(filter=""){
  let box = document.getElementById("list");
  box.innerHTML = "";

  suppliers
    .filter(s=>s.toLowerCase().includes(filter.toLowerCase()))
    .sort((a,b)=>a.localeCompare(b,'he'))
    .forEach(s=>{
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = s;

      div.onclick = ()=>{
        selected = s;
        document.getElementById("selectedSupplier").innerText = "✔ " + s;
        closeModal();
      };

      box.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input", function(){
  renderList(this.value);
});

/* ---------------- העלאה ---------------- */

async function upload(){

  if(!selected){
    alert("בחר ספק");
    return;
  }

  let file = document.getElementById("file").files[0];

  if(!file){
    alert("בחר קובץ");
    return;
  }

  let form = new FormData();
  form.append("supplier", selected);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", file);

  let res = await fetch(API+"/upload",{
    method:"POST",
    body: form
  });

  let data = await res.json();

  if(!res.ok){
    alert("⚠️ " + data.message);
    return;
  }

  alert("✔ הועלה בהצלחה");
}
</script>

</body>
</html>
