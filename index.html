<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>העלאת חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:15px; }
input, select, button { width:100%; padding:15px; margin:8px 0; font-size:18px; }
button { background:#00c853; color:#fff; border:none; }
video { width:100%; border-radius:10px; margin-top:10px; }
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<select id="supplier"></select>

<input id="newSupplier" placeholder="הוסף ספק חדש">
<button onclick="addSupplier()">➕ הוסף ספק</button>

<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">

<video id="video" autoplay playsinline></video>

<button onclick="switchCamera()">🔄 החלף מצלמה</button>
<button onclick="takePhoto()">📷 צלם</button>

<canvas id="canvas" style="display:none;"></canvas>

<button onclick="upload()">שלח</button>

<script>
const API = "https://invoice-backend-omy5.onrender.com";

document.getElementById("date").valueAsDate = new Date();

async function loadSuppliers(){
  let res = await fetch(API+"/suppliers");
  let data = await res.json();

  let s = document.getElementById("supplier");
  s.innerHTML = "";

  data.forEach(x=>{
    s.innerHTML += `<option>${x}</option>`;
  });
}
loadSuppliers();

async function addSupplier(){
  let name = document.getElementById("newSupplier").value;

  await fetch(API+"/supplier",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });

  document.getElementById("newSupplier").value = "";
  loadSuppliers();
}

let currentStream;
let useFront = false;

async function startCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(track => track.stop());
  }

  currentStream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: useFront ? "user" : "environment"
    }
  });

  document.getElementById("video").srcObject = currentStream;
}

function switchCamera(){
  useFront = !useFront;
  startCamera();
}

let capturedBlob;

function takePhoto(){
  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  canvas.toBlob(blob => {
    capturedBlob = blob;
    alert("📷 תמונה צולמה");
  }, "image/jpeg");
}

async function upload(){
  if(!capturedBlob){
    alert("צלם תמונה קודם");
    return;
  }

  let form = new FormData();
  form.append("supplier", document.getElementById("supplier").value);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", capturedBlob);

  let res = await fetch(API+"/upload",{
    method:"POST",
    body: form
  });

  let data = await res.json();
  alert(data.message);
}

startCamera();
</script>

</body>
</html>
