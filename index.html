<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:15px; }
input, select, button { width:100%; padding:15px; margin:8px 0; font-size:18px; }
button { background:#00c853; color:#fff; border:none; }
video { width:100%; border-radius:10px; }
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<select id="supplier"></select>

<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">

<video id="video" autoplay playsinline></video>

<button onclick="camBack()">📷 מצלמה אחורית</button>
<button onclick="camFront()">🤳 מצלמה קדמית</button>
<button onclick="takePhoto()">📸 צלם</button>

<canvas id="canvas" style="display:none;"></canvas>

<button onclick="upload()">שלח</button>

<script>
const API = "https://invoice-backend-omy5.onrender.com";

document.getElementById("date").valueAsDate = new Date();

async function loadSuppliers(){
  let res = await fetch(API+"/suppliers");
  let data = await res.json();

  let s = document.getElementById("supplier");
  s.innerHTML = "";

  data.forEach(x=>{
    s.innerHTML += `<option>${x}</option>`;
  });
}
loadSuppliers();

async function uploadSupplier(name){
  await fetch(API+"/supplier",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  loadSuppliers();
}

let stream;
let facing = "environment";

async function startCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }

  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ exact:facing } }
    });
  }catch(e){
    stream = await navigator.mediaDevices.getUserMedia({video:true});
  }

  document.getElementById("video").srcObject = stream;
}

function camBack(){
  facing = "environment";
  startCamera();
}

function camFront(){
  facing = "user";
  startCamera();
}

let photoBlob;

function takePhoto(){
  let video = document.getElementById("video");
  let canvas = document.getElementById("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video,0,0);

  canvas.toBlob(blob=>{
    photoBlob = blob;
    alert("📸 תמונה צולמה");
  },"image/jpeg");
}

async function upload(){
  if(!photoBlob){
    alert("צלם קודם");
    return;
  }

  let form = new FormData();
  form.append("supplier", document.getElementById("supplier").value);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", photoBlob);

  let res = await fetch(API+"/upload",{
    method:"POST",
    body: form
  });

  let data = await res.json();
  alert(data.message);
}

startCamera();
</script>

</body>
</html>
