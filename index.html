<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:15px; }

input, button {
  width:100%;
  padding:15px;
  margin:8px 0;
  font-size:18px;
}

button { background:#00c853; color:#fff; border:none; }

.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  padding:20px;
}

.modal-content {
  background:#222;
  padding:15px;
  max-height:80%;
  overflow-y:auto;
}

.item {
  padding:10px;
  margin:5px 0;
  background:#333;
  cursor:pointer;
}

.smallBtn {
  background:#444;
}

#selectedSupplier {
  margin:10px 0;
}
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<!-- ספק -->
<button onclick="openModal()">בחר ספק</button>
<div id="selectedSupplier">❗ לא נבחר ספק</div>

<button class="smallBtn" onclick="showAdd()">➕ הוסף ספק חדש</button>

<div id="addBox" style="display:none;">
  <input id="newSupplier" placeholder="שם ספק חדש">
  <button onclick="addSupplier()">שמור ספק</button>
</div>

<!-- מודל -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>ספקים</h3>
    <input id="search" placeholder="חיפוש ספק">
    <div id="list"></div>
    <button onclick="closeModal()">סגור</button>
  </div>
</div>

<!-- נתונים -->
<input id="digits" placeholder="4 ספרות חשבונית">
<input type="date" id="date">
<input type="file" id="file" accept="image/*">

<button onclick="upload()">שלח</button>

<script>
const API = "https://invoice-backend-omy5.onrender.com";

let suppliers = [];
let selected = "";

document.getElementById("date").valueAsDate = new Date();

/* ---------------- ספקים ---------------- */

async function loadSuppliers(){
  try{
    let res = await fetch(API+"/suppliers");
    suppliers = await res.json();
  }catch(e){
    suppliers = [];
  }
}
loadSuppliers();

/* ---------------- מודל ---------------- */

function openModal(){
  document.getElementById("modal").style.display="block";
  renderList();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function renderList(filter=""){
  let box = document.getElementById("list");
  box.innerHTML = "";

  suppliers
    .filter(s=>s.toLowerCase().includes(filter.toLowerCase()))
    .sort((a,b)=>a.localeCompare(b,'he'))
    .forEach(s=>{
      let div = document.createElement("div");
      div.className="item";
      div.innerText=s;

      div.onclick=()=>{
        selected=s;
        document.getElementById("selectedSupplier").innerText="✔ " + s;
        closeModal();
      };

      box.appendChild(div);
    });
}

document.getElementById("search").addEventListener("input",function(){
  renderList(this.value);
});

/* ---------------- הוספת ספק ---------------- */

function showAdd(){
  document.getElementById("addBox").style.display =
    document.getElementById("addBox").style.display==="none" ? "block" : "none";
}

async function addSupplier(){
  let name = document.getElementById("newSupplier").value;
  if(!name) return;

  try{
    await fetch(API+"/supplier",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name})
    });

    document.getElementById("newSupplier").value="";
    alert("✔ ספק נוסף");
    loadSuppliers();

  }catch(e){
    alert("❌ שגיאה בהוספת ספק");
  }
}

/* ---------------- העלאה ---------------- */

async function upload(){

  if(!selected){
    alert("בחר ספק");
    return;
  }

  let file = document.getElementById("file").files[0];
  if(!file){
    alert("בחר קובץ");
    return;
  }

  let digits = document.getElementById("digits").value;

  // שם קובץ חכם
  let fileName = selected + "_" + digits + ".jpg";

  let form = new FormData();
  form.append("supplier", selected);
  form.append("digits", digits);
  form.append("date", document.getElementById("date").value);
  form.append("file", file, fileName);

  try{
    let res = await fetch(API+"/upload",{
      method:"POST",
      body: form
    });

    let data = await res.json();

    if(!res.ok){
      alert("⚠️ " + (data.message || "כפילות קיימת"));
      return;
    }

    alert("✔ הועלה בהצלחה");

  }catch(e){
    alert("❌ שגיאה בשרת");
    console.log(e);
  }
}
</script>

</body>
</html>
