<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, select, button { width:100%; padding:12px; margin:8px 0; font-size:16px; }
button { background:green; color:white; border:none; border-radius:6px; }
h2 { text-align:center; }
#msg { margin-top:10px; color:#00e676; }
</style>
</head>

<body>

<h2>📤 מערכת חשבוניות</h2>

<!-- ספק -->
<input id="supplier" placeholder="שם ספק חדש">
<button onclick="addSupplier()">➕ הוסף ספק</button>

<select id="supplierList"></select>

<!-- חשבונית -->
<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">

<!-- מצלמה + גלריה -->
<input type="file" id="file" accept="image/*">

<button onclick="upload()">שלח חשבונית</button>

<p id="msg"></p>

<script>
const API = "https://invoice-backend-2akp.onrender.com";

/* טעינת ספקים */
async function loadSuppliers(){
  try {
    let res = await fetch(API + "/suppliers");
    let data = await res.json();

    let s = document.getElementById("supplierList");
    s.innerHTML = "";

    data.forEach(x=>{
      s.innerHTML += `<option value="${x}">${x}</option>`;
    });

  } catch(err){
    document.getElementById("msg").innerText = "שגיאה בטעינת ספקים";
  }
}
loadSuppliers();

/* הוספת ספק */
async function addSupplier(){
  let name = document.getElementById("supplier").value;
  let msg = document.getElementById("msg");

  if(!name){
    msg.innerText = "הכנס שם ספק";
    return;
  }

  await fetch(API + "/supplier", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name })
  });

  document.getElementById("supplier").value = "";
  loadSuppliers();
}

/* העלאה מתוקנת (FIX מצלמה) */
async function upload(){
  let msg = document.getElementById("msg");
  let fileInput = document.getElementById("file");

  if(!fileInput.files || fileInput.files.length === 0){
    msg.innerText = "בחר קובץ או צלם תמונה";
    return;
  }

  let file = fileInput.files[0];

  let form = new FormData();
  form.append("supplier", document.getElementById("supplierList").value);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", file, file.name);

  msg.innerText = "מעלה...";

  try {
    let res = await fetch(API + "/upload", {
      method:"POST",
      body: form
    });

    let data = await res.json();

    if(data.ok){
      msg.innerText = "✔ הועלה בהצלחה";

      // 🔥 קריטי - פתרון הבאג של מצלמה במובייל
      fileInput.value = "";

      document.getElementById("digits").value = "";
    } else {
      msg.innerText = data.message || "שגיאה";
    }

  } catch(err){
    msg.innerText = "שגיאת חיבור לשרת";
  }
}
</script>

</body>
</html>
