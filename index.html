<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מערכת חשבוניות</title>

<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
input, select, button { width:100%; padding:12px; margin:8px 0; font-size:16px; }
button { background:green; color:white; border:none; }
</style>
</head>

<body>

<h2>📤 העלאת חשבונית</h2>

<input id="supplier" placeholder="שם ספק">
<button onclick="addSupplier()">הוסף ספק</button>

<select id="supplierList"></select>

<input id="digits" placeholder="4 ספרות אחרונות">
<input type="date" id="date">
<input type="file" id="file">

<button onclick="upload()">שלח</button>

<p id="msg"></p>

<script>
const API = "https://invoice-backend-2akp.onrender.com";

/* ספקים */
async function loadSuppliers(){
  let res = await fetch(API+"/suppliers");
  let data = await res.json();

  let s = document.getElementById("supplierList");
  s.innerHTML = "";

  data.forEach(x=>{
    s.innerHTML += `<option>${x}</option>`;
  });
}
loadSuppliers();

/* הוספת ספק */
async function addSupplier(){
  let name = document.getElementById("supplier").value;

  await fetch(API+"/supplier",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name })
  });

  loadSuppliers();
}

/* העלאה */
async function upload(){
  let msg = document.getElementById("msg");

  let file = document.getElementById("file").files[0];
  if(!file){
    msg.innerText = "בחר קובץ";
    return;
  }

  let form = new FormData();
  form.append("supplier", document.getElementById("supplierList").value);
  form.append("digits", document.getElementById("digits").value);
  form.append("date", document.getElementById("date").value);
  form.append("file", file);

  msg.innerText = "מעלה...";

  let res = await fetch(API+"/upload",{
    method:"POST",
    body: form
  });

  let data = await res.json();

  msg.innerText = data.ok ? "הועלה בהצלחה" : data.message;
}
</script>

</body>
</html>
